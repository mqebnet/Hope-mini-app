<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hope - Invite</title>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>
<body>
  <!-- Top Navigation Bar (Shared) -->
  <header id="top-nav">
  <button id="profile-button" aria-label="Profile Menu">
    <i data-lucide="user"></i>
  </button>

  <div id="user-stats">
    <p class="tag" data-i18n="topbar.level">Level</p>
    <span id="current-level">-</span>
    <p class="tag" data-i18n="topbar.xp">XP</p>
    <span id="user-exp">-</span>
  </div>

  <div id="ticket-icons">
    <span id="bronze-tickets">-</span>
    <span id="silver-tickets">-</span>
    <span id="gold-tickets">-</span>
  </div>

  <div id="ton-connect-ui"></div>

  <button id="ton-connect-button" aria-label="Connect Wallet"></button>
</header>
<div id="display-panel">
  <p class="tag" data-i18n="topbar.points">Points</p>
  <div id="points-bar">
    <div id="points-progress"></div>
    <span id="points-display">—</span>
  </div>
</div>


  <!-- Main Content: Invite -->
  <main id="main-content">
  <!-- invitePage.html -->
<section id="invite-content">
  <div class="invite-box">
    <input id="invite-link" readonly />
    <button id="copy-invite-btn">
      <i data-lucide="copy"></i> <span data-i18n="invite.copy_button">Invite Frens</span>
    </button>
  </div>

  <div class="invite-tasks">
    <div class="invite-task" data-target="1">
      <p data-i18n="invite.task_1">Invite 1 friend</p>
      <div class="progress">
        <div class="progress-bar"></div>
        <span class="progress-label">0/1</span>
      </div>
      <button class="check-button" data-i18n="invite.check">Check</button>
    </div>

    <div class="invite-task" data-target="3">
      <p data-i18n="invite.task_3">Invite 3 friends</p>
      <div class="progress">
        <div class="progress-bar"></div>
        <span class="progress-label">0/3</span>
      </div>
      <button class="check-button" data-i18n="invite.check">Check</button>
    </div>

    <div class="invite-task" data-target="5">
      <p data-i18n="invite.task_5">Invite 5 friends</p>
      <div class="progress">
        <div class="progress-bar"></div>
        <span class="progress-label">0/5</span>
      </div>
      <button class="check-button" data-i18n="invite.check">Check</button>
    </div>

    <div class="invite-task" data-target="10">
      <p data-i18n="invite.task_10">Invite 10 friends</p>
      <div class="progress">
        <div class="progress-bar"></div>
        <span class="progress-label">0/10</span>
      </div>
      <button class="check-button" data-i18n="invite.check">Check</button>
    </div>
  </div>
</section>


<section class="referral-leaderboard">
  <h2 data-i18n="invite.top_referrers">Top Referrers</h2>
  <div class="referral-board-container">
    <div class="referral-header">
      <span data-i18n="invite.rank">Rank</span>
      <span data-i18n="invite.user">User</span>
      <span data-i18n="invite.referrals">Referrals</span>
    </div>
    <div id="referral-leaderboard-list" class="leaderboard-list"></div>
  </div>
</section>
  </main>

<!-- profile panel-->
<div id="profile-container"></div>

  <!-- Bottom Navigation Bar -->
 <footer id="bottom-nav">
      <a href="index.html" class="nav-btn" data-page="home"><i data-lucide="home"></i> <span data-i18n="nav.home">Home</span></a>
      <a href="leaderBoard.html" class="nav-btn" data-page="leaderBoard"><i data-lucide="trending-up"></i> <span data-i18n="nav.leaders">Leaders</span></a>
      <a href="invitePage.html" class="nav-btn" data-page="invitePage"><i data-lucide="users"></i> <span data-i18n="nav.invite">Invite</span></a>
      <a href="marketPlace.html" class="nav-btn" data-page="marketPlace"><i data-lucide="shopping-cart"></i> <span data-i18n="nav.marketplace">Marketplace</span></a>
      <a href="tasksPage.html" class="nav-btn" data-page="tasksPage"><i data-lucide="check-square"></i> <span data-i18n="nav.tasks">Tasks</span></a>
  </footer>

  <script type="module" src="notify.js"></script>
  <script type="module" src="userData.js"></script>
  <script type="module" src="script.js"></script>
  <script type="module" src="tonconnect.js"></script>
  <script type="module" src="connectWallet.js"></script>
  <script type="module" src="invite.js"></script>
  <script type="module" src="profile.js"></script>
  <script src="activeTab.js" defer></script>
  
    
<script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
