<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hope – Flip Cards</title>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Top Navigation Bar -->
<header id="top-nav">
  <button id="profile-button" aria-label="Profile Menu">
    <i data-lucide="user"></i>
  </button>

  <div id="user-stats">
    <p class="tag">Level</p>
    <span id="current-level">-</span>
    <p class="tag">XP</p>
    <span id="user-exp">-</span>
  </div>

  <div id="ticket-icons">
    <span id="bronze-tickets">-</span>
    <span id="silver-tickets">-</span>
    <span id="gold-tickets">-</span>
  </div>
</header>

<div id="display-panel">
  <p class="tag">Points</p>
  <div id="points-bar">
    <div id="points-progress"></div>
    <span id="points-display">—</span>
  </div>
</div>

<main id="main-content">
  <h1 class="page-title">Flip Cards</h1>
  <p style="color: #b3d9cc; margin: 10px; text-align: center;">Match triplets to win rewards!</p>

  <div id="flipcards-game"></div>
</main>

<!-- Profile -->
<div id="profile-container"></div>

<!-- Bottom Navigation -->
<footer id="bottom-nav">
  <a href="index.html" class="nav-btn" data-page="home"><i data-lucide="home"></i> Home</a>
  <a href="leaderBoard.html" class="nav-btn" data-page="leaderBoard"><i data-lucide="trending-up"></i> Leaders</a>
  <a href="invitePage.html" class="nav-btn" data-page="invitePage"><i data-lucide="users"></i> Invite</a>
  <a href="marketPlace.html" class="nav-btn" data-page="marketPlace"><i data-lucide="shopping-cart"></i> Marketplace</a>
  <a href="tasksPage.html" class="nav-btn" data-page="tasksPage"><i data-lucide="check-square"></i> Tasks</a>
</footer>

<script src="notify.js" defer></script>
<script type="module" src="userData.js"></script>
<script type="module" src="script.js"></script>
<script type="module" src="flipCards.js"></script>
<script type="module" src="profile.js"></script>
<script src="activeTab.js" defer></script>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    // Initialize telegram webapp
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
    }

    // Load user data
    try {
      const { fetchUserData, updateTopBar } = await import('./userData.js');
      const user = await fetchUserData();
      updateTopBar(user);
    } catch (err) {
      console.error('Failed to load user data:', err);
    }

    // Initialize lucide icons
    lucide.createIcons();
  });
</script>

</body>
</html>
