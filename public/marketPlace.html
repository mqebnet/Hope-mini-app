<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hope - Marketplace</title>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script src="https://unpkg.com/@tonconnect/sdk@latest" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header id="top-nav">
  <button id="profile-button" aria-label="Profile Menu">
    <i data-lucide="user"></i>
  </button>

  <div id="user-stats">
    <p class="tag">Level</p>
    <span id="current-level">-</span>
    <p class="tag">XP</p>
    <span id="user-exp">-</span>
  </div>

  <div id="ticket-icons">
    <span id="bronze-tickets">-</span>
    <span id="silver-tickets">-</span>
    <span id="gold-tickets">-</span>
  </div>

  <div id="ton-connect-ui"></div>
  <button id="ton-connect-button" aria-label="Connect Wallet"></button>
</header>

<div id="display-panel">
  <p class="tag">Points</p>
  <div id="points-bar">
    <div id="points-progress"></div>
    <span id="points-display">-</span>
  </div>
</div>

<main id="main-content">
  <h1 class="page-title">Marketplace</h1>

  <div id="marketplace-tabs">
    <button class="market-tab active" data-tab="games">Games</button>
    <button class="market-tab" data-tab="exchange">Exchange</button>
  </div>

  <section id="games-section" class="market-section active">
    <h2>Games</h2>
    <div id="games-container">
      <div id="games-grid"></div>
    </div>

    <div id="mystery-box-launcher" class="hidden">
      <h2>Mystery Boxes</h2>
      <div class="mystery-box-panel">
        <div id="mystery-box-track" class="mystery-box-track"></div>
        <button id="open-market-mystery-box-button">
          <i data-lucide="gift"></i> Get Mystery Box
        </button>
        <div id="mystery-box-info"></div>
      </div>
      <button id="mystery-box-back-button" class="mystery-box-back-button">Back to Games</button>
    </div>
  </section>

  <section id="exchange-section" class="market-section">
    <h2>Exchange Tickets</h2>

    <div class="exchange-container">
      <div class="ticket-selector">
        <select id="exchange-type">
          <option value="bronze">Bronze -> Silver</option>
          <option value="silver">Silver -> Gold</option>
        </select>
      </div>

      <div class="ticket-options">
        <div class="amount-grid">
          <button class="amount-option" data-amount="100">100</button>
          <button class="amount-option" data-amount="200">200</button>
          <button class="amount-option" data-amount="500">500</button>
          <button class="amount-option" data-amount="1000">1k</button>
          <button class="amount-option" data-amount="5000">5k</button>
          <button class="amount-option" data-amount="10000">10k</button>
        </div>
      </div>

      <div class="exchange-preview">
        <div id="from-ticket"></div>
        <i data-lucide="arrow-right"></i>
        <div id="to-ticket"></div>
      </div>

      <button id="trade-button" disabled>Trade</button>
    </div>
  </section>
</main>

<div id="profile-container"></div>

<footer id="bottom-nav">
  <a href="index.html" class="nav-btn" data-page="home"><i data-lucide="home"></i> Home</a>
  <a href="leaderBoard.html" class="nav-btn" data-page="leaderBoard"><i data-lucide="trending-up"></i> Leaders</a>
  <a href="invitePage.html" class="nav-btn" data-page="invitePage"><i data-lucide="users"></i> Invite</a>
  <a href="marketPlace.html" class="nav-btn" data-page="marketPlace"><i data-lucide="shopping-cart"></i> Marketplace</a>
  <a href="tasksPage.html" class="nav-btn" data-page="tasksPage"><i data-lucide="check-square"></i> Tasks</a>
</footer>

<script src="notify.js" defer></script>
<script type="module" src="userData.js"></script>
<script type="module" src="script.js"></script>
<script type="module" src="tonconnect.js"></script>
<script type="module" src="connectWallet.js"></script>
<script type="module" src="games.js"></script>
<script type="module" src="marketPlace.js"></script>
<script type="module" src="profile.js"></script>
<script src="activeTab.js" defer></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) window.lucide.createIcons();
  });
</script>

</body>
</html>
