<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script src="https://unpkg.com/@tonconnect/sdk@latest" defer></script>

</head>
<body>
  <!-- Top Navigation Bar (Shared) -->
<header id="top-nav">
  <button id="profile-button" aria-label="Profile Menu">
    <i data-lucide="user"></i>
  </button>

  <div id="user-stats">
    <p class="tag">Level</p>
    <span id="current-level">—</span>

  <div id="points-bar">
    <div id="points-progress">
      <span id="points-display">—</span>
    </div>
  </div>

    <p class="tag">XP</p>
    <span id="user-exp">—</span>
  </div>

  <div id="ticket-icons">
    <span id="bronze-tickets">—</span>
    <span id="silver-tickets">—</span>
    <span id="gold-tickets">—</span>
  </div>

  <div id="ton-connect-ui"></div>

  <button id="ton-connect-button" aria-label="Connect Wallet">
    <i data-lucide="wallet"></i>
  </button>
</header>




  <!-- Main Content: Leaders -->
<main id="main-content">
  <section id="leaders-content">
    <h1 id="leaderboard-title">
  <span id="leaderboard-level">Level 1 • Seeker</span>
</h1>

    
    <div id="leaderboard-container">
      <div id="leaderboard" class="leaderboard">
        <div class="leaderboard-header">
          <span>Rank</span>
          <span>User ID</span>
          <span>XP</span>
          <span>Points</span>
          <span>Transactions</span>
        </div>
        <div id="leaderboard-list" class="leaderboard-list">
          <!-- Leaderboard entries will be dynamically added here -->
        </div>
      </div>
    </div>
  </section>
</main>
<!-- profile panel-->
<div id="profile-container"></div>


  <!-- Bottom Navigation Bar -->
  <footer id="bottom-nav">
    <a href="index.html" class="nav-btn" data-page="home"><i data-lucide="home"></i> Home</a>
    <a href="leaderBoard.html" class="nav-btn" data-page="leaderBoard"><i data-lucide="trending-up"></i> Leaders</a>
    <a href="invitePage.html" class="nav-btn" data-page="invitePage"><i data-lucide="users"></i> Invite</a>
    <a href="marketPlace.html" class="nav-btn" data-page="marketPlace"><i data-lucide="shopping-cart"></i> Marketplace</a>
    <a href="tasksPage.html" class="nav-btn" data-page="tasksPage"><i data-lucide="check-square"></i> Tasks</a>
</footer>

  <script type="module" src="userData.js"></script>
  <script src="script.js" defer></script>
  <script src="tonconnect.js" defer></script>
  <script src="connectWallet.js" defer></script>
  <script type="module" src="leaderBoard.js"></script>
  <script src="profile.js" defer></script>
  <script src="activeTab.js" defer></script>
  <script type="module">
    import { TonConnectUI } from '@tonconnect/ui';
    
    const tonConnectUI = new TonConnectUI({
      manifestUrl: 'https://your-domain.com/tonconnect-manifest.json',
      buttonRootId: 'ton-connect-button'
    });
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
